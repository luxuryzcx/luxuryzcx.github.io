<header class="topbar">
  <a class="brand" href="{{ "/" | relURL }}">
    <span>{{ site.Title }}</span>
  </a>

  <nav class="main-nav" aria-label="主导航">
    {{ range site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ site.Params.github }}" aria-label="GitHub">GitHub</a>
  </nav>
</header>
